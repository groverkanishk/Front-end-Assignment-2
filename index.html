<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #085979;
            --bg-deep: #054a66;
            --accent: #ec8005;
            --accent-light: #f5a03a;
            --surface: rgba(255,255,255,0.07);
            --surface-hover: rgba(255,255,255,0.12);
            --border: rgba(187,224,239,0.15);
            --text: #BBE0EF;
            --text-dim: rgba(187,224,239,0.55);
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 20px;
        }

        /* ---------- HEADER ---------- */
        header {
            text-align: center;
            margin-bottom: 48px;
        }

        header .eyebrow {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 500;
            margin-bottom: 10px;
        }

        header h1 {
            font-size: 32px;
            font-weight: 300;
            color: var(--white);
            letter-spacing: -0.5px;
        }

        header h1 span {
            font-weight: 600;
            color: var(--text);
        }

        /* ---------- SEARCH ---------- */
        .search-wrap {
            width: 100%;
            max-width: 520px;
            margin-bottom: 32px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 6px 6px 6px 20px;
            backdrop-filter: blur(8px);
            transition: border-color 0.2s, background 0.2s;
        }

        .search-box:focus-within {
            border-color: rgba(187,224,239,0.4);
            background: rgba(255,255,255,0.13);
        }

        .search-box input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 400;
        }

        .search-box input::placeholder { color: var(--text-dim); }

        .search-box button {
            background: var(--accent);
            color: var(--white);
            border: none;
            border-radius: 10px;
            padding: 10px 22px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        .search-box button:hover { background: var(--accent-light); }
        .search-box button:active { transform: scale(0.97); }

        /* ---------- HISTORY PILLS ---------- */
        .history-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            min-height: 32px;
            margin-bottom: 40px;
            max-width: 520px;
            width: 100%;
        }

        .history-row .pill {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 400;
            padding: 5px 14px;
            border-radius: 99px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }

        .history-row .pill:hover {
            background: var(--surface-hover);
            border-color: rgba(187,224,239,0.35);
        }

        .history-row .no-history {
            font-size: 12px;
            color: var(--text-dim);
            align-self: center;
        }

        /* ---------- WEATHER CARD ---------- */
        .weather-card {
            width: 100%;
            max-width: 520px;
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--border);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            overflow: hidden;
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.35s ease, transform 0.35s ease;
        }

        .weather-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .card-top {
            padding: 28px 28px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
        }

        .city-name {
            font-size: 26px;
            font-weight: 600;
            color: var(--white);
            letter-spacing: -0.3px;
        }

        .country-badge {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--accent);
            margin-top: 4px;
        }

        .temp-block {
            text-align: right;
        }

        .temp-value {
            font-size: 48px;
            font-weight: 300;
            color: var(--white);
            line-height: 1;
            font-family: 'DM Mono', monospace;
        }

        .temp-unit {
            font-size: 20px;
            color: var(--text-dim);
        }

        .weather-desc {
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 4px;
            text-transform: capitalize;
        }

        /* ---------- STATS GRID ---------- */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }

        .stat-item {
            padding: 20px 28px;
            border-bottom: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        .stat-item:nth-child(even) { border-right: none; }
        .stat-item:nth-last-child(-n+2) { border-bottom: none; }

        .stat-label {
            font-size: 11px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 500;
            color: var(--white);
            font-family: 'DM Mono', monospace;
        }

        .stat-unit {
            font-size: 12px;
            color: var(--text-dim);
            margin-left: 3px;
            font-family: 'DM Sans', sans-serif;
        }

        /* ---------- ERROR ---------- */
        .error-msg {
            color: #f08080;
            font-size: 14px;
            text-align: center;
            padding: 20px;
        }

        /* ---------- LOADING ---------- */
        .loading {
            color: var(--text-dim);
            font-size: 14px;
            text-align: center;
            padding: 20px;
        }

        @media (max-width: 480px) {
            header h1 { font-size: 24px; }
            .temp-value { font-size: 38px; }
            .city-name { font-size: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <p class="eyebrow">Live Weather</p>
        <h1>Weather <span>Tracker</span></h1>
    </header>

    <div class="search-wrap">
        <div class="search-box">
            <input id="cityInput" placeholder="Search a city — Delhi, London..." autocomplete="off" />
            <button id="searchBtn">Search</button>
        </div>
    </div>

    <div class="history-row" id="history"></div>

    <div class="weather-card" id="weatherCard">
        <div id="weather"></div>
    </div>

    <script>
        const API_KEY = "3df9f36aa032d7a84d1b805a523499ed";

        const weatherBox  = document.getElementById("weather");
        const historyBox  = document.getElementById("history");
        const weatherCard = document.getElementById("weatherCard");
        const cityInput   = document.getElementById("cityInput");

        /* ---------- WEATHER FETCH ---------- */
        async function getWeather(city) {
            const res = await fetch(
                `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
            );
            if (!res.ok) throw new Error("City not found");
            return res.json();
        }

        /* ---------- RENDER ---------- */
        function renderWeather(d) {
            weatherBox.innerHTML = `
                <div class="card-top">
                    <div>
                        <div class="city-name">${d.name}</div>
                        <div class="country-badge">${d.sys.country}</div>
                    </div>
                    <div class="temp-block">
                        <div class="temp-value">${Math.round(d.main.temp)}<span class="temp-unit">°C</span></div>
                        <div class="weather-desc">${d.weather[0].description}</div>
                    </div>
                </div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-label">Feels Like</div>
                        <div class="stat-value">${Math.round(d.main.feels_like)}<span class="stat-unit">°C</span></div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Humidity</div>
                        <div class="stat-value">${d.main.humidity}<span class="stat-unit">%</span></div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Wind Speed</div>
                        <div class="stat-value">${d.wind.speed}<span class="stat-unit">m/s</span></div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Pressure</div>
                        <div class="stat-value">${d.main.pressure}<span class="stat-unit">hPa</span></div>
                    </div>
                </div>
            `;
            weatherCard.classList.add("visible");
        }

        /* ---------- SAVE HISTORY ---------- */
        function saveHistory(city) {
            let history = JSON.parse(localStorage.getItem("weatherHistory")) || [];
            history = history.filter(c => c.toLowerCase() !== city.toLowerCase());
            history.unshift(city);
            history = history.slice(0, 6);
            localStorage.setItem("weatherHistory", JSON.stringify(history));
            showHistory();
        }

        /* ---------- SHOW HISTORY ---------- */
        function showHistory() {
            const history = JSON.parse(localStorage.getItem("weatherHistory")) || [];
            if (history.length === 0) {
                historyBox.innerHTML = `<span class="no-history">Your recent searches will appear here</span>`;
                return;
            }
            historyBox.innerHTML = history
                .map(city => `<button class="pill" onclick="search('${city}')">${city}</button>`)
                .join("");
        }

        /* ---------- SEARCH ---------- */
        async function search(city) {
            weatherCard.classList.remove("visible");
            weatherBox.innerHTML = `<p class="loading">Fetching weather…</p>`;
            weatherCard.classList.add("visible");
            try {
                const data = await getWeather(city);
                renderWeather(data);
                saveHistory(data.name);
                cityInput.value = "";
            } catch (err) {
                weatherBox.innerHTML = `<p class="error-msg">City not found. Please try again.</p>`;
            }
        }

        /* ---------- EVENTS ---------- */
        document.getElementById("searchBtn").onclick = () => {
            const city = cityInput.value.trim();
            if (city) search(city);
        };

        cityInput.addEventListener("keydown", e => {
            if (e.key === "Enter") {
                const city = cityInput.value.trim();
                if (city) search(city);
            }
        });

        /* ---------- INIT ---------- */
        showHistory();
    </script>
</body>
</html>
